version: "3.9"

services:
  deepseek-vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
      --tensor-parallel-size 1
      --dtype bfloat16
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --enable-chunked-prefill
      --port 8000
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # SGLang alternative — better TTFT for interactive use
  deepseek-sglang:
    image: lmsysorg/sglang:latest
    command: >
      python -m sglang.launch_server
      --model-path deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
      --tp 1
      --dtype bfloat16
      --context-length 32768
      --enable-flashinfer
      --host 0.0.0.0
      --port 8001
    ports:
      - "8001:8001"
    profiles: ["sglang"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  # Nginx load balancer for multi-replica deployments
  nginx:
    image: nginx:alpine
    profiles: ["multi-replica"]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - deepseek-vllm

volumes:
  huggingface_cache:
